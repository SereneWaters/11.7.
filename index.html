<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreamy Habit RPG Tracker</title>
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkhhYml0IFJQRyBUcmFja2VyIiwKICAic2hvcnRlcl9uYW1lIjogIkhhYml0IFNoY29yZSIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjMTAwODJiIiwKICAidGhlbWVfY29sb3IiOiAiI2Q2YmNmZiIKfQ==">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Default Dark Mode Theme */
            --bg: linear-gradient(135deg, #0e0720 0%, #1c0f3a 40%, #3a1c5d 75%, #5d327c 100%);
            --card: rgba(255, 255, 255, 0.06);
            --card-border: rgba(220, 180, 255, 0.15);
            --text: #f1e9ff;
            --text-heading: #ffffff;
            --muted: #bda6e0;
            --primary: #b388ff;
            --primary-glow: rgba(179, 136, 255, 0.4);
            --btn-gradient: linear-gradient(135deg, #9c27b0 0%, #673ab7 100%);
            --success: #81c784;
            --danger: #ff8a80;
            --warning: #ffd54f;
            --low: #90caf9;
            --medium: #ce93d8;
            --high: #f48fb1;
            --input-bg: rgba(14, 7, 32, 0.4);
            --modal-bg: rgba(30, 18, 54, 0.95);
            --heading-shadow: 0 0 10px rgba(220, 180, 255, 0.6), 0 0 20px rgba(179, 136, 255, 0.3);
        }

        /* Light Mode Custom Palette based on Heaven Clouds & Glitter Wallpaper */
        [data-theme="light"] {
            --bg: linear-gradient(135deg, #f3ecf9 0%, #e3d2f6 35%, #fcd6eb 70%, #f7e6f3 100%);
            --card: rgba(255, 255, 255, 0.65);
            --card-border: rgba(214, 158, 237, 0.35);
            --text: #4e366e;
            --text-heading: #582f8c;
            --muted: #8b71b0;
            --primary: #ff8bbb;
            --primary-glow: rgba(255, 139, 187, 0.4);
            --btn-gradient: linear-gradient(135deg, #ff8bbb 0%, #b382ec 100%);
            --success: #66bb6a;
            --danger: #ff6b6b;
            --warning: #ffa726;
            --low: #a0c4ff;
            --medium: #cbb4f7;
            --high: #ffadad;
            --input-bg: rgba(255, 255, 255, 0.8);
            --modal-bg: rgba(253, 246, 255, 0.98);
            --heading-shadow: 0 2px 4px rgba(186, 119, 219, 0.2), 0 0 8px rgba(255, 139, 187, 0.3);
        }

        body {
            font-family: 'Quicksand', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            background-attachment: fixed;
            color: var(--text);
            margin: 0;
            padding: 12px;
            padding-bottom: 80px;
            min-height: 100vh;
            transition: background 0.3s ease, color 0.3s ease;
        }
        
        /* Distinctive Standout Heading Font */
        h2 {
            font-family: 'Comfortaa', 'Quicksand', cursive, sans-serif;
            font-size: 1.6rem;
            margin-top: 0;
            margin-bottom: 14px;
            color: var(--text-heading);
            text-shadow: var(--heading-shadow);
            letter-spacing: 1px;
        }

        h1, h3 { 
            margin-top: 0; 
            color: var(--text-heading); 
            text-shadow: var(--heading-shadow);
            font-weight: 700;
            letter-spacing: 0.2px;
        }
        .section {
            background: var(--card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 18px;
            box-shadow: 0 8px 24px rgba(135, 90, 180, 0.1);
        }
        .status-bar { font-size: 0.85rem; color: var(--muted); text-align: center; margin-bottom: 12px; font-weight: 600; }
        
        input, select, textarea {
            width: 100%;
            padding: 11px;
            margin: 6px 0 14px 0;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            color: var(--text);
            box-sizing: border-box;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
        }
        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 8px var(--primary-glow);
        }
        button {
            background: var(--btn-gradient);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            width: 100%;
            font-size: 0.95rem;
            box-shadow: 0 4px 12px rgba(179, 136, 255, 0.2);
            transition: transform 0.1s, box-shadow 0.2s;
        }
        button:active { transform: scale(0.97); }
        button.secondary { background: rgba(0, 0, 0, 0.05); border: 1px solid var(--card-border); margin-top: 4px; box-shadow: none; color: var(--text); }
        [data-theme="dark"] button.secondary { background: rgba(255, 255, 255, 0.08); }
        button.action-btn { width: auto; padding: 4px 10px; font-size: 0.75rem; font-weight: 600; margin-left: 2px; box-shadow: none; border-radius: 6px; }
        button.edit-btn { background: rgba(0,0,0,0.06); color: var(--text); border: 1px solid var(--card-border); }
        [data-theme="dark"] button.edit-btn { background: rgba(255,255,255,0.15); }
        button.danger-btn { background: linear-gradient(135deg, #ff7676, #f44336); }
        button.claim-btn { background: linear-gradient(135deg, #ff71b2, #ec407a); width: auto; padding: 6px 14px; font-size: 0.85rem; box-shadow: 0 4px 10px rgba(236,64,122,0.3); }

        .flex-between { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
        .button-group { display: flex; gap: 4px; align-items: center; }

        .item-card {
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 14px;
            margin-top: 10px;
            position: relative;
        }
        [data-theme="dark"] .item-card { background: rgba(255, 255, 255, 0.03); }
        
        /* Ultra-Compact Clean Goal Design */
        .goal-card { 
            border-left: 4px solid var(--primary); 
            box-shadow: inset 4px 0 8px -4px var(--primary-glow);
            padding: 8px 10px;
            margin-top: 6px;
            gap: 6px;
        }
        .goal-details {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0; 
            flex: 1;
        }
        .goal-title-text {
            font-size: 0.95rem; 
            color: var(--text-heading);
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .goal-reward-text {
            font-size: 0.75rem; 
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .reward-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.68rem;
            font-weight: bold;
            color: #fff;
            margin-top: 4px;
            letter-spacing: 0.5px;
        }
        .priority-low { background-color: #8cb6f6; }
        .priority-medium { background-color: #bfa3f0; }
        .priority-high { background-color: #fca1c1; }
        
        .streak-badge {
            background: rgba(241, 139, 187, 0.12);
            border: 1px solid var(--primary-glow);
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--text-heading);
            white-space: nowrap;
        }

        /* Multistate Log Toggles */
        .habit-log-row {
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid var(--card-border);
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 10px;
        }
        [data-theme="dark"] .habit-log-row { background: rgba(14, 7, 32, 0.3); }
        
        .state-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-top: 8px;
        }
        .state-btn {
            padding: 9px;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.04);
            border: 1px solid var(--card-border);
            color: var(--muted);
            box-shadow: none;
            border-radius: 8px;
        }
        [data-theme="dark"] .state-btn { background: rgba(255,255,255,0.05); }
        .state-btn.active-pending { background: #7c7393; color: #fff; border-color: #9287ab; }
        .state-btn.active-success { background: linear-gradient(135deg, #57b65b, #81c784); color: #fff; border-color: #81c784; box-shadow: 0 0 8px rgba(76,175,80,0.3); }
        .state-btn.active-failed { background: linear-gradient(135deg, #e65252, #ff7171); color: #fff; border-color: #ff8a80; box-shadow: 0 0 8px rgba(239,68,68,0.3); }

        /* Calendar Styling */
        .calendar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
        .calendar-header button { width: auto; padding: 6px 14px; background: rgba(0,0,0,0.04); border: 1px solid var(--card-border); box-shadow: none; color: var(--text); }
        [data-theme="dark"] .calendar-header button { background: rgba(255,255,255,0.08); }
        #calendarMonthYear { flex: 1; text-align: center; margin: 0; }
        
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            text-align: center;
        }
        .calendar-day-name { font-size: 0.75rem; color: var(--muted); font-weight: 700; padding-bottom: 6px; }
        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            position: relative;
        }
        [data-theme="dark"] .calendar-day { background: rgba(14, 7, 32, 0.25); border-color: rgba(220, 180, 255, 0.05); }
        .calendar-day:hover { background: rgba(255, 255, 255, 0.4); }
        .calendar-day.today { border: 2px solid var(--primary); box-shadow: 0 0 8px var(--primary-glow); font-weight: 700; }
        .calendar-day.empty { background: transparent; border: none; cursor: default; }
        
        /* Advanced Dynamic Color Codes */
        .day-all-success { background-color: rgba(102, 187, 106, 0.25); border: 1px solid var(--success); }
        .day-mixed-status { background-color: rgba(186, 104, 200, 0.25); border: 1px solid var(--primary); }
        .day-any-fail { background-color: rgba(255, 107, 107, 0.2); border: 1px solid var(--danger); }
        .day-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--primary); box-shadow: 0 0 6px var(--primary); margin-top: 3px; }

        /* Modal Layouts */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(36, 21, 56, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-content { 
            background: var(--modal-bg); 
            border: 1px solid var(--card-border);
            box-shadow: 0 20px 40px rgba(93, 45, 137, 0.25);
            padding: 24px; 
            border-radius: 24px; 
            width: 100%; 
            max-width: 400px; 
            max-height: 85vh; 
            overflow-y: auto; 
        }

        .victory-title { font-size: 1.8rem; color: #ff60a8; text-shadow: 0 0 12px rgba(255,96,168,0.4); text-align: center; margin-bottom: 10px; font-weight: 700; }
        .victory-reward { font-size: 1.2rem; background: rgba(255,139,187,0.12); padding: 14px; border-radius: 14px; text-align: center; border: 1px dashed var(--primary); margin: 15px 0; color: var(--text-heading); }
        canvas#celebrationCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }

        /* Magical Theme Toggle Button */
        .theme-toggle-btn {
            position: fixed;
            bottom: 16px;
            right: 16px;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: var(--btn-gradient);
            box-shadow: 0 4px 16px rgba(160, 90, 220, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            z-index: 90;
            border: 1px solid rgba(255,255,255,0.3);
        }
    </style>
</head>
<body data-theme="dark">

    <div class="status-bar" id="storageLock">🎀 Securing App Engine...</div>
    <canvas id="celebrationCanvas"></canvas>

    <!-- GOALS SECTION -->
    <div class="section">
        <h2>Goals</h2>
        <div id="goalsContainer" style="display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px;"></div>
        <button onclick="openGoalModal()">💕 Create New Goal</button>
    </div>

    <!-- CALENDAR SECTION -->
    <div class="section">
        <div class="calendar-header">
            <button onclick="changeMonth(-1)">🌸 Prev</button>
            <h3 id="calendarMonthYear">Month Year</h3>
            <button onclick="changeMonth(1)">Next 🌸</button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <!-- UNLOCKED REWARDS -->
    <div class="section" style="border: 1px solid rgba(255, 139, 187, 0.4); background: rgba(255, 139, 187, 0.04);">
        <h2>Claimable</h2>
        <div id="unlockedContainer"></div>
    </div>

    <!-- REWARD VAULT -->
    <div class="section">
        <h2>Rewards</h2>
        <div id="rewardsContainer"></div>
        <button onclick="openRewardModal()">⭐ Create New Reward Item</button>
    </div>

    <!-- MODAL: GOAL MODAL -->
    <div class="modal" id="goalModal">
        <div class="modal-content">
            <h3 id="goalModalTitle">Create New Goal</h3>
            <input type="hidden" id="editGoalId" value="">
            
            <label>Goal Title</label>
            <input type="text" id="goalTitle" placeholder="🌸 Drink clear water, read books...">
            
            <label>Target Streak (Consecutive Days Needed)</label>
            <input type="number" id="goalDays" value="7" min="1">
            
            <label>Link Reward From Treasury</label>
            <select id="goalRewardSelect"><option value="">No Reward Assigned Yet</option></select>
            
            <button id="saveGoalBtn" onclick="saveGoal()">Create Goal</button>
            <button class="secondary" onclick="closeModal('goalModal')">Cancel</button>
        </div>
    </div>

    <!-- MODAL: REWARD MODAL -->
    <div class="modal" id="rewardModal">
        <div class="modal-content">
            <h3>Create Reward Pool Item</h3>
            <input type="hidden" id="editRewardId" value="">
            
            <label>Reward Name</label>
            <input type="text" id="rewardName" placeholder="🎀 Bubble bath, cute dress, gaming night">
            
            <label>Priority Theme Color</label>
            <select id="rewardPriority">
                <option value="low">Soft Sky Blue</option>
                <option value="medium" selected>Dreamy Lilac</option>
                <option value="high">Glitter Pink</option>
            </select>
            
            <button id="saveRewardBtn" onclick="saveReward()">Save to Treasury</button>
            <button class="secondary" onclick="closeModal('rewardModal')">Cancel</button>
        </div>
    </div>

    <!-- MODAL: INDIVIDUAL DAY LOGGER -->
    <div class="modal" id="logModal">
        <div class="modal-content">
            <h3>Log Fairy Habits</h3>
            <p id="logModalDate" style="color: var(--muted); margin-bottom: 16px; font-weight:600;"></p>
            <div id="logModalGoalsList"></div>
            <button class="secondary" onclick="closeModal('logModal')" style="margin-top:12px;">Close</button>
        </div>
    </div>

    <!-- MODAL: CELEBRATION POPUP -->
    <div class="modal" id="celebrationModal" style="z-index: 1000;">
        <div class="modal-content" style="text-align: center; border: 2px solid #ff8bbb;">
            <div class="victory-title">✨ STREAK UNLOCKED! ✨</div>
            <p id="celebrationGoalText" style="font-size: 1.1rem; font-weight: bold; margin: 10px 0;"></p>
            <div id="celebrationRewardBox" class="victory-reward"></div>
            <button onclick="closeModal('celebrationModal')" style="background: var(--btn-gradient); margin-top: 10px;">Magical!</button>
        </div>
    </div>

    <!-- FLOATING THEME TOGGLE SWITCH -->
    <button class="theme-toggle-btn" id="themeToggle" onclick="toggleTheme()" title="Switch Aesthetics">🌓</button>

<script>
    let db;
    let currentNavDate = new Date();
    let selectedLogDateStr = "";

    const dbRequest = indexedDB.open("HabitRPGDatabase", 4);
    dbRequest.onupgradeneeded = (e) => {
        let database = e.target.result;
        if(!database.objectStoreNames.contains("goals")) database.createObjectStore("goals", { keyPath: "id", autoIncrement: true });
        if(!database.objectStoreNames.contains("rewards")) database.createObjectStore("rewards", { keyPath: "id", autoIncrement: true });
        if(!database.objectStoreNames.contains("history")) database.createObjectStore("history", { keyPath: "dateStr" }); 
    };
    dbRequest.onsuccess = (e) => {
        db = e.target.result;
        initApp();
    };

    function initApp() {
        const savedTheme = localStorage.getItem("girly-rpg-theme") || "dark";
        document.body.setAttribute("data-theme", savedTheme);
        document.getElementById("themeToggle").innerText = savedTheme === "dark" ? "☁️" : "🔮";

        if (navigator.storage && navigator.storage.persist) {
            navigator.storage.persist().then(granted => {
                document.getElementById('storageLock').innerText = granted ? "✨ Permanent Fairy Storage Active" : "🌸 Temporary Memory Mode";
            });
        }
        setupCanvasSize();
        window.addEventListener('resize', setupCanvasSize);
        initAmbientSparkles();
        recalculateAllStreaks(() => {
            renderAll();
        });
    }

    function toggleTheme() {
        const currentTheme = document.body.getAttribute("data-theme");
        const nextTheme = currentTheme === "dark" ? "light" : "dark";
        document.body.setAttribute("data-theme", nextTheme);
        localStorage.setItem("girly-rpg-theme", nextTheme);
        document.getElementById("themeToggle").innerText = nextTheme === "dark" ? "☁️" : "🔮";
        renderCalendar();
    }

    function renderAll() {
        renderGoals();
        renderRewardsPool();
        renderCalendar();
    }

    function closeModal(id) { 
        document.getElementById(id).style.display = 'none'; 
        if(id === 'logModal') {
            recalculateAllStreaks(() => renderAll());
        }
    }

    // --- REWARDS LOGIC ---
    function openRewardModal() {
        document.getElementById('editRewardId').value = "";
        document.getElementById('rewardName').value = "";
        document.getElementById('rewardPriority').value = "medium";
        document.getElementById('rewardModal').style.display = 'flex';
    }

    function saveReward() {
        const name = document.getElementById('rewardName').value.trim();
        const priority = document.getElementById('rewardPriority').value;
        const editId = document.getElementById('editRewardId').value;
        if (!name) return;

        let tx = db.transaction("rewards", "readwrite");
        let store = tx.objectStore("rewards");

        if (editId) {
            store.get(parseInt(editId)).onsuccess = (e) => {
                let data = e.target.result;
                data.name = name;
                data.priority = priority;
                store.put(data);
            };
        } else {
            store.add({ name, priority, status: "pool" });
        }

        tx.oncomplete = () => {
            closeModal('rewardModal');
            renderAll();
        };
    }

    function openEditReward(id) {
        db.transaction("rewards", "readonly").objectStore("rewards").get(id).onsuccess = (e) => {
            const r = e.target.result;
            if (!r) return;
            document.getElementById('editRewardId').value = r.id;
            document.getElementById('rewardName').value = r.name;
            document.getElementById('rewardPriority').value = r.priority;
            document.getElementById('rewardModal').style.display = 'flex';
        };
    }

    function renderRewardsPool() {
        const container = document.getElementById('rewardsContainer');
        const unlockedContainer = document.getElementById('unlockedContainer');
        container.innerHTML = '';
        unlockedContainer.innerHTML = '';

        db.transaction("rewards", "readonly").objectStore("rewards").getAll().onsuccess = (e) => {
            const list = e.target.result;
            list.forEach(r => {
                const card = document.createElement('div');
                card.className = "item-card flex-between";
                
                if(r.status === 'unlocked') {
                    card.innerHTML = `
                        <div>
                            <strong>🌸 ${r.name}</strong><br>
                            <span class="reward-tag priority-${r.priority}">${r.priority.toUpperCase()}</span>
                        </div>
                        <div class="button-group">
                            <button class="action-btn edit-btn" onclick="openEditReward(${r.id})">Edit</button>
                            <button class="claim-btn" onclick="claimReward(${r.id})">Claim 💕</button>
                        </div>
                    `;
                    unlockedContainer.appendChild(card);
                } else {
                    card.innerHTML = `
                        <div>
                            <strong>✨ ${r.name}</strong><br>
                            <span class="reward-tag priority-${r.priority}">${r.priority.toUpperCase()}</span>
                        </div>
                        <div class="button-group">
                            <button class="action-btn edit-btn" onclick="openEditReward(${r.id})">Edit</button>
                            <button class="action-btn danger-btn" onclick="deleteReward(${r.id})">Drop</button>
                        </div>
                    `;
                    container.appendChild(card);
                }
            });
            if(!unlockedContainer.innerHTML) unlockedContainer.innerHTML = `<p style="color:var(--muted); font-size:0.9rem; text-align:center;">No rewards ready yet. Stay sweet! ✨</p>`;
        };
    }

    function deleteReward(id) {
        if(confirm("Remove this reward setup?")) {
            let tx = db.transaction("rewards", "readwrite");
            tx.objectStore("rewards").delete(id);
            tx.oncomplete = () => renderAll();
        }
    }

    function claimReward(id) {
        let tx = db.transaction("rewards", "readwrite");
        tx.objectStore("rewards").delete(id);
        tx.oncomplete = () => renderAll();
    }

    function populateRewardDropdown(selectedRewardId) {
        const select = document.getElementById('goalRewardSelect');
        select.innerHTML = '<option value="">No Reward Assigned Yet</option>';
        db.transaction("rewards", "readonly").objectStore("rewards").getAll().onsuccess = (e) => {
            e.target.result.filter(r => r.status === 'pool' || r.id === selectedRewardId).forEach(r => {
                const isSelected = r.id === selectedRewardId ? 'selected' : '';
                select.innerHTML += `<option value="${r.id}" ${isSelected}>${r.name} (${r.priority})</option>`;
            });
        };
    }

    // --- GOALS LOGIC ---
    function saveGoal() {
        const title = document.getElementById('goalTitle').value.trim();
        const days = parseInt(document.getElementById('goalDays').value);
        const rewardId = document.getElementById('goalRewardSelect').value;
        const editId = document.getElementById('editGoalId').value;
        if(!title || isNaN(days)) return;

        let tx = db.transaction("goals", "readwrite");
        let store = tx.objectStore("goals");

        if (editId) {
            store.get(parseInt(editId)).onsuccess = (e) => {
                let data = e.target.result;
                data.title = title;
                data.days = days;
                data.rewardId = rewardId ? parseInt(rewardId) : null;
                store.put(data);
            };
        } else {
            store.add({ title, days, streak: 0, rewardId: rewardId ? parseInt(rewardId) : null });
        }

        tx.oncomplete = () => {
            closeModal('goalModal');
            recalculateAllStreaks(() => renderAll());
        };
    }

    function openGoalModal() {
        document.getElementById('goalModalTitle').innerText = "Create New Goal";
        document.getElementById('saveGoalBtn').innerText = "Create Goal";
        document.getElementById('editGoalId').value = "";
        document.getElementById('goalTitle').value = "";
        document.getElementById('goalDays').value = "7";
        populateRewardDropdown(null);
        document.getElementById('goalModal').style.display = 'flex';
    }

    function openEditGoal(id) {
        db.transaction("goals", "readonly").objectStore("goals").get(id).onsuccess = (e) => {
            const g = e.target.result;
            if (!g) return;
            document.getElementById('goalModalTitle').innerText = "Edit Active Goal";
            document.getElementById('saveGoalBtn').innerText = "Update Goal";
            document.getElementById('editGoalId').value = g.id;
            document.getElementById('goalTitle').value = g.title;
            document.getElementById('goalDays').value = g.days;
            populateRewardDropdown(g.rewardId);
            document.getElementById('goalModal').style.display = 'flex';
        };
    }

    function renderGoals() {
        const container = document.getElementById('goalsContainer');
        container.innerHTML = '';

        db.transaction(["goals", "rewards"], "readonly").objectStore("goals").getAll().onsuccess = (e) => {
            const goals = e.target.result;
            if(goals.length === 0) {
                container.innerHTML = `<p style="color:var(--muted); text-align:center; margin: 6px 0;">No goals tracked yet. Add one below! 🎀</p>`;
                return;
            }
            
            goals.forEach(g => {
                const card = document.createElement('div');
                card.className = "item-card goal-card flex-between";
                
                let rewardHtml = `<span class="goal-reward-text">No Gift linked</span>`;
                if(g.rewardId) {
                    db.transaction("rewards", "readonly").objectStore("rewards").get(g.rewardId).onsuccess = (re) => {
                        if(re.target.result) {
                            document.getElementById(`rew-${g.id}`).innerHTML = `🎁 Reward: <strong>${re.target.result.name}</strong>`;
                        }
                    };
                    rewardHtml = `<span id="rew-${g.id}" class="goal-reward-text">Loading gift...</span>`;
                }

                card.innerHTML = `
                    <div class="goal-details">
                        <div class="goal-title-text" title="${g.title}">🎀 ${g.title}</div>
                        ${rewardHtml}
                    </div>
                    <div class="button-group">
                        <span class="streak-badge">⭐ ${g.streak}/${g.days} D</span>
                        <button class="action-btn edit-btn" onclick="openEditGoal(${g.id})">Edit</button>
                        <button class="action-btn danger-btn" onclick="deleteGoal(${g.id})">X</button>
                    </div>
                `;
                container.appendChild(card);
            });
        };
    }

    function deleteGoal(id) {
        if(confirm("Delete this habit goal configuration?")) {
            let tx = db.transaction("goals", "readwrite");
            tx.objectStore("goals").delete(id);
            tx.oncomplete = () => renderAll();
        }
    }

    // --- CONSECUTIVE STREAK ALGORITHM ---
    function recalculateAllStreaks(callback) {
        let tx = db.transaction(["history", "goals", "rewards"], "readwrite");
        let historyStore = tx.objectStore("history");
        let goalStore = tx.objectStore("goals");
        let rewardStore = tx.objectStore("rewards");

        historyStore.getAll().onsuccess = (he) => {
            const logs = he.target.result.reduce((acc, current) => {
                acc[current.dateStr] = current.statuses || {};
                return acc;
            }, {});

            goalStore.getAll().onsuccess = (ge) => {
                const goals = ge.target.result;
                let pendingOperations = goals.length;

                if (pendingOperations === 0 && callback) callback();

                goals.forEach(goal => {
                    let currentStreak = 0;
                    let checkDate = new Date(); 
                    let broke = false;

                    for (let i = 0; i < 365; i++) {
                        let dateStr = `${checkDate.getFullYear()}-${checkDate.getMonth()}-${checkDate.getDate()}`;
                        let dayStatus = logs[dateStr] ? logs[dateStr][goal.id] : undefined;

                        if (dayStatus === "success") {
                            currentStreak++;
                        } else if (dayStatus === "failed") {
                            broke = true;
                        } else {
                            if (i > 0) broke = true;
                        }

                        if (broke) break;
                        checkDate.setDate(checkDate.getDate() - 1); 
                    }

                    goal.streak = currentStreak;

                    if (goal.streak >= goal.days) {
                        triggerCelebration(goal);
                        if (goal.rewardId) {
                            rewardStore.get(goal.rewardId).onsuccess = (re) => {
                                let rew = re.target.result;
                                if(rew) {
                                    rew.status = 'unlocked';
                                    rewardStore.put(rew);
                                }
                            };
                        }
                        goalStore.delete(goal.id);
                    } else {
                        goalStore.put(goal);
                    }

                    pendingOperations--;
                    if (pendingOperations === 0 && callback) callback();
                });
            };
        };
    }

    // --- CALENDAR ENGINE ---
    function changeMonth(direction) {
        currentNavDate.setMonth(currentNavDate.getMonth() + direction);
        renderCalendar();
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        const monthYearLabel = document.getElementById('calendarMonthYear');
        grid.innerHTML = '';

        const year = currentNavDate.getFullYear();
        const month = currentNavDate.getMonth();
        monthYearLabel.innerText = currentNavDate.toLocaleDateString('default', { month: 'long', year: 'numeric' });

        ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => grid.innerHTML += `<div class="calendar-day-name">${d}</div>`);

        const firstDayIndex = new Date(year, month, 1).getDay();
        const totalDays = new Date(year, month + 1, 0).getDate();

        for(let i=0; i<firstDayIndex; i++) {
            grid.innerHTML += `<div class="calendar-day empty"></div>`;
        }

        db.transaction("history", "readonly").objectStore("history").getAll().onsuccess = (event) => {
            const historyList = event.target.result;
            const logs = historyList.reduce((acc, current) => {
                acc[current.dateStr] = current.statuses || {}; 
                return acc;
            }, {});

            const today = new Date();
            const todayStr = `${today.getFullYear()}-${today.getMonth()}-${today.getDate()}`;

            for(let day=1; day<=totalDays; day++) {
                const dateStr = `${year}-${month}-${day}`;
                let statusClass = '';
                
                if (logs[dateStr]) {
                    let values = Object.values(logs[dateStr]);
                    if (values.length > 0) {
                        if (values.includes('failed')) {
                            statusClass = 'day-any-fail';
                        } else if (values.includes('success') && !values.includes('pending')) {
                            statusClass = 'day-all-success';
                        } else if (values.includes('success')) {
                            statusClass = 'day-mixed-status';
                        }
                    }
                }

                const isToday = todayStr === dateStr ? 'today' : '';
                grid.innerHTML += `
                    <div class="calendar-day ${statusClass} ${isToday}" onclick="openDayLog('${dateStr}', ${day})">
                        ${day}
                        ${isToday ? '<div class="day-dot"></div>': ''}
                    </div>
                `;
            }
        };
    }

    function openDayLog(dateStr, displayDay) {
        selectedLogDateStr = dateStr;
        document.getElementById('logModalDate').innerText = currentNavDate.toLocaleDateString('default', { month: 'long', year: 'numeric' }) + ` ${displayDay}`;
        
        const container = document.getElementById('logModalGoalsList');
        container.innerHTML = '';

        db.transaction(["history", "goals"], "readonly").objectStore("history").get(dateStr).onsuccess = (e) => {
            const logEntry = e.target.result;
            const savedStatuses = logEntry ? (logEntry.statuses || {}) : {};

            db.transaction("goals", "readonly").objectStore("goals").getAll().onsuccess = (ge) => {
                const activeGoals = ge.target.result;
                
                if (activeGoals.length === 0) {
                    container.innerHTML = `<p style="color:var(--muted); text-align:center;">No active items found.</p>`;
                    document.getElementById('logModal').style.display = 'flex';
                    return;
                }

                activeGoals.forEach(goal => {
                    const currentStatus = savedStatuses[goal.id] || "pending";
                    const row = document.createElement('div');
                    row.className = "habit-log-row";
                    row.innerHTML = `
                        <div style="margin-bottom:6px;"><strong style="color: var(--text-heading);">🎀 ${goal.title}</strong></div>
                        <div class="state-selector">
                            <button class="state-btn ${currentStatus === 'pending' ? 'active-pending' : ''}" onclick="setHabitState(${goal.id}, 'pending')">Wait</button>
                            <button class="state-btn ${currentStatus === 'success' ? 'active-success' : ''}" onclick="setHabitState(${goal.id}, 'success')">💕 Success</button>
                            <button class="state-btn ${currentStatus === 'failed' ? 'active-failed' : ''}" onclick="setHabitState(${goal.id}, 'failed')">❌ Missed</button>
                        </div>
                    `;
                    container.appendChild(row);
                });

                document.getElementById('logModal').style.display = 'flex';
            };
        };
    }

    function setHabitState(goalId, newState) {
        let tx = db.transaction("history", "readwrite");
        let historyStore = tx.objectStore("history");

        historyStore.get(selectedLogDateStr).onsuccess = (e) => {
            let log = e.target.result || { dateStr: selectedLogDateStr, statuses: {} };
            if(!log.statuses) log.statuses = {};
            
            log.statuses[goalId] = newState;
            
            historyStore.put(log).onsuccess = () => {
                openDayLog(selectedLogDateStr, selectedLogDateStr.split('-')[2]);
            };
        };
    }

    // --- CELEBRATION MODAL ---
    function triggerCelebration(goal) {
        document.getElementById('celebrationGoalText').innerText = `"${goal.title}"`;
        const rewardBox = document.getElementById('celebrationRewardBox');
        
        if (goal.rewardId) {
            db.transaction("rewards", "readonly").objectStore("rewards").get(goal.rewardId).onsuccess = (e) => {
                const r = e.target.result;
                rewardBox.style.display = 'block';
                rewardBox.innerHTML = r ? `👑 PRINCESS AWARD: <strong>${r.name}</strong>` : `🎁 Gift Box Unlocked!`;
            };
        } else {
            rewardBox.style.display = 'none';
        }

        document.getElementById('celebrationModal').style.display = 'flex';
        for(let i=0; i<4; i++) {
            setTimeout(() => spawnFireworkCluster(Math.random() * canvas.width, canvas.height * 0.4), i*300);
        }
    }

    const canvas = document.getElementById('celebrationCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let ambientStars = [];

    function setupCanvasSize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function initAmbientSparkles() {
        ambientStars = [];
        const count = Math.floor((canvas.width * canvas.height) / 8000); 
        for(let i=0; i<count; i++) {
            ambientStars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2.5 + 0.5,
                alpha: Math.random(),
                speed: Math.random() * 0.01 + 0.005,
                color: Math.random() > 0.5 ? '#ffb3d1' : '#fff9fc'
            });
        }
        requestAnimationFrame(updateAndRenderCanvasEngine);
    }

    function spawnFireworkCluster(x, y) {
        const colors = ['#ff60a8', '#b382ec', '#fca1c1', '#ffa726', '#ffffff', '#ffccd5'];
        const baseColor = colors[Math.floor(Math.random() * colors.length)];
        for (let i = 0; i < 50; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 5 + 2;
            particles.push({
                x: x, y: y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                alpha: 1,
                decay: Math.random() * 0.015 + 0.01,
                color: Math.random() > 0.3 ? baseColor : colors[Math.floor(Math.random()*colors.length)]
            });
        }
    }

    function updateAndRenderCanvasEngine() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ambientStars.forEach(s => {
            s.alpha += s.speed;
            if(s.alpha > 1 || s.alpha < 0) s.speed = -s.speed;
            ctx.save();
            ctx.globalAlpha = Math.max(0, s.alpha);
            ctx.fillStyle = s.color;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        });

        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.04;
            p.alpha -= p.decay;

            if (p.alpha <= 0) {
                particles.splice(i, 1);
            } else {
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        if (document.getElementById('celebrationModal').style.display === 'flex' && Math.random() < 0.03) {
            spawnFireworkCluster(Math.random() * canvas.width, Math.random() * canvas.height * 0.6);
        }

        requestAnimationFrame(updateAndRenderCanvasEngine);
    }
</script>
