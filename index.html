<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit RPG Tracker</title>
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkhhYml0IFJQRyBUcmFja2VyIiwKICAic2hvcnRfbmFtZSI6ICJIYWJpdFNoY29yZSIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjMGYxNzJhIiwKICAidGhlbWVfY29sb3IiOiAiIzYzNjZmMSIKfQ==">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --muted: #94a3b8;
            --primary: #6366f1;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --low: #3b82f6;
            --medium: #f59e0b;
            --high: #ef4444;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 12px;
            padding-bottom: 60px;
        }
        h1, h2, h3 { margin-top: 0; color: #fff; }
        .section {
            background: var(--card);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .status-bar { font-size: 0.8rem; color: var(--muted); text-align: center; margin-bottom: 12px; }
        
        /* Form Controls */
        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin: 6px 0 14px 0;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 0.95rem;
        }
        button.secondary { background: #334155; margin-top: 4px;}
        button.action-btn { width: auto; padding: 6px 10px; font-size: 0.8rem; font-weight: normal; margin-left: 4px; }
        button.edit-btn { background: #475569; }
        button.danger-btn { background: var(--danger); }
        button.claim-btn { background: var(--success); width: auto; padding: 8px 14px; font-size: 0.9rem;}

        /* Flex helpers */
        .flex-between { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .button-group { display: flex; gap: 6px; }

        /* Items Lists */
        .item-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            margin-top: 10px;
            position: relative;
        }
        .goal-card { border-left: 4px solid var(--primary); }
        .reward-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            color: #fff;
            margin-top: 4px;
        }
        .priority-low { background-color: var(--low); }
        .priority-medium { background-color: var(--medium); }
        .priority-high { background-color: var(--high); }
        
        .streak-badge {
            background: #334155;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            white-space: nowrap;
        }

        /* Habit Row Inside Logger */
        .habit-log-row {
            background: #0f172a;
            border: 1px solid #334155;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .habit-toggle-btn {
            width: auto;
            padding: 8px 16px;
            background: #334155;
            font-size: 0.9rem;
        }
        .habit-toggle-btn.done {
            background: var(--success);
        }

        /* Calendar Styling */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .calendar-header button { width: auto; padding: 6px 12px; background: #334155; }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            text-align: center;
        }
        .calendar-day-name { font-size: 0.75rem; color: var(--muted); font-weight: bold; padding-bottom: 4px; }
        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #0f172a;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            border: 1px solid transparent;
            position: relative;
        }
        .calendar-day.today { border: 2px solid var(--primary); }
        .calendar-day.empty { background: transparent; cursor: default; }
        
        /* Dynamic Calendar Status Shades */
        .day-all-success { background-color: rgba(34, 197, 94, 0.25); border: 1px solid var(--success); }
        .day-some-success { background-color: rgba(245, 158, 11, 0.2); border: 1px solid var(--warning); }
        .day-all-fail { background-color: rgba(239, 68, 68, 0.2); border: 1px solid var(--danger); }
        .day-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--primary); margin-top: 2px; }

        /* Modal / Overlay for logging */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-content { background: var(--card); padding: 20px; border-radius: 12px; width: 100%; max-width: 400px; max-height: 85vh; overflow-y: auto; }

        /* Celebration Screen Layout */
        .victory-title { font-size: 2rem; color: #f59e0b; text-align: center; margin-bottom: 10px; }
        .victory-reward { font-size: 1.2rem; background: rgba(99,102,241,0.2); padding: 12px; border-radius: 8px; text-align: center; border: 1px dashed var(--primary); margin: 15px 0; }
        canvas#celebrationCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
    </style>
</head>
<body>

    <div class="status-bar" id="storageLock">Securing App Engine...</div>
    <canvas id="celebrationCanvas"></canvas>

    <!-- 1. GOALS SECTION -->
    <div class="section">
        <h2>🎯 Active Goals</h2>
        <div id="goalsContainer"></div>
        <button onclick="openGoalModal()">+ Create New Goal</button>
    </div>

    <!-- 4. CALENDAR SECTION -->
    <div class="section">
        <div class="calendar-header">
            <button onclick="changeMonth(-1)">◀</button>
            <h3 id="calendarMonthYear" style="margin:0;">Month Year</h3>
            <button onclick="changeMonth(1)">▶</button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <!-- 3. UNLOCKED REWARDS (SHOPPING LIST) -->
    <div class="section" style="border: 2px solid var(--success);">
        <h2>🎁 Unlocked Rewards (Ready to Claim)</h2>
        <div id="unlockedContainer"></div>
    </div>

    <!-- 2. REWARD VAULT -->
    <div class="section">
        <h2>💎 Reward List Pool</h2>
        <div id="rewardsContainer"></div>
        <button onclick="openRewardModal()">+ Create New Reward Pool Item</button>
    </div>

    <!-- MODAL: GOAL CREATION / EDITING -->
    <div class="modal" id="goalModal">
        <div class="modal-content">
            <h3 id="goalModalTitle">Create New Goal</h3>
            <input type="hidden" id="editGoalId" value="">
            
            <label>Goal Title (e.g., 10k Steps Daily)</label>
            <input type="text" id="goalTitle" placeholder="Walk 10k steps">
            
            <label>Duration Target (Days in a row)</label>
            <input type="number" id="goalDays" value="7" min="1">
            
            <label>Link Reward</label>
            <select id="goalRewardSelect"><option value="">No Reward Assigned Yet</option></select>
            
            <button id="saveGoalBtn" onclick="saveGoal()">Create Goal</button>
            <button class="secondary" onclick="closeModal('goalModal')">Cancel</button>
        </div>
    </div>

    <!-- MODAL: REWARD CREATION / EDITING -->
    <div class="modal" id="rewardModal">
        <div class="modal-content">
            <h3>Create Reward</h3>
            <input type="hidden" id="editRewardId" value="">
            
            <label>Reward Name</label>
            <input type="text" id="rewardName" placeholder="Cheat Meal, New Game, Sleep In">
            
            <label>Priority Color Focus</label>
            <select id="rewardPriority">
                <option value="low">Low Priority (Blue)</option>
                <option value="medium" selected>Medium Priority (Orange)</option>
                <option value="high">High Priority (Red)</option>
            </select>
            
            <button id="saveRewardBtn" onclick="saveReward()">Save to Pool</button>
            <button class="secondary" onclick="closeModal('rewardModal')">Cancel</button>
        </div>
    </div>

    <!-- MODAL: INDIVIDUAL DAY LOGGER -->
    <div class="modal" id="logModal">
        <div class="modal-content">
            <h3 id="logModalTitle">Log Habits</h3>
            <p id="logModalDate" style="color: var(--muted); margin-bottom: 16px;"></p>
            <div id="logModalGoalsList"></div>
            <button class="secondary" onclick="closeModal('logModal')" style="margin-top:12px;">Done Tracking</button>
        </div>
    </div>

    <!-- MODAL: CELEBRATION POPUP -->
    <div class="modal" id="celebrationModal" style="z-index: 1000;">
        <div class="modal-content" style="text-align: center; border: 2px solid #f59e0b;">
            <div class="victory-title">🎉 GOAL ACHIEVED! 🎉</div>
            <p id="celebrationGoalText" style="font-size: 1.1rem; font-weight: bold; margin: 10px 0;"></p>
            <div id="celebrationRewardBox" class="victory-reward"></div>
            <p style="color: var(--muted); font-size: 0.9rem;">Your reward has been added to your Unlocked Rewards list!</p>
            <button onclick="closeModal('celebrationModal')" style="background: var(--success); margin-top: 10px;">Awesome!</button>
        </div>
    </div>

<script>
    let db;
    let currentNavDate = new Date();
    let selectedLogDateStr = "";

    // Open & Protect Database (Version 3 incorporates granular goal tracking)
    const dbRequest = indexedDB.open("HabitRPGDatabase", 3);
    dbRequest.onupgradeneeded = (e) => {
        let database = e.target.result;
        if(!database.objectStoreNames.contains("goals")) database.createObjectStore("goals", { keyPath: "id", autoIncrement: true });
        if(!database.objectStoreNames.contains("rewards")) database.createObjectStore("rewards", { keyPath: "id", autoIncrement: true });
        if(!database.objectStoreNames.contains("history")) database.createObjectStore("history", { keyPath: "dateStr" }); 
    };
    dbRequest.onsuccess = (e) => {
        db = e.target.result;
        initApp();
    };

    function initApp() {
        if (navigator.storage && navigator.storage.persist) {
            navigator.storage.persist().then(granted => {
                document.getElementById('storageLock').innerText = granted ? "🔒 Permanent Storage Engaged" : "⚠️ Device Storage Management Active";
            });
        }
        setupCanvasSize();
        window.addEventListener('resize', setupCanvasSize);
        renderAll();
    }

    function renderAll() {
        renderGoals();
        renderRewardsPool();
        renderCalendar();
    }

    function closeModal(id) { 
        document.getElementById(id).style.display = 'none'; 
        if(id === 'logModal') renderAll(); 
    }

    // --- REWARDS LOGIC ---
    function saveReward() {
        const name = document.getElementById('rewardName').value.trim();
        const priority = document.getElementById('rewardPriority').value;
        const editId = document.getElementById('editRewardId').value;
        if (!name) return;

        let tx = db.transaction("rewards", "readwrite");
        let store = tx.objectStore("rewards");

        if (editId) {
            store.get(parseInt(editId)).onsuccess = (e) => {
                let data = e.target.result;
                data.name = name;
                data.priority = priority;
                store.put(data);
            };
        } else {
            store.add({ name, priority, status: "pool" });
        }

        tx.oncomplete = () => {
            closeModal('rewardModal');
            renderAll();
        };
    }

    function openEditReward(id) {
        db.transaction("rewards", "readonly").objectStore("rewards").get(id).onsuccess = (e) => {
            const r = e.target.result;
            if (!r) return;
            document.getElementById('editRewardId').value = r.id;
            document.getElementById('rewardName').value = r.name;
            document.getElementById('rewardPriority').value = r.priority;
            document.getElementById('rewardModal').style.display = 'flex';
        };
    }

    function renderRewardsPool() {
        const container = document.getElementById('rewardsContainer');
        const unlockedContainer = document.getElementById('unlockedContainer');
        container.innerHTML = '';
        unlockedContainer.innerHTML = '';

        db.transaction("rewards", "readonly").objectStore("rewards").getAll().onsuccess = (e) => {
            const list = e.target.result;
            list.forEach(r => {
                const card = document.createElement('div');
                card.className = "item-card flex-between";
                
                if(r.status === 'unlocked') {
                    card.innerHTML = `
                        <div>
                            <strong>${r.name}</strong><br>
                            <span class="reward-tag priority-${r.priority}">${r.priority.toUpperCase()}</span>
                        </div>
                        <div class="button-group">
                            <button class="action-btn edit-btn" onclick="openEditReward(${r.id})">Edit</button>
                            <button class="claim-btn" onclick="claimReward(${r.id})">Claim</button>
                        </div>
                    `;
                    unlockedContainer.appendChild(card);
                } else {
                    card.innerHTML = `
                        <div>
                            <strong>${r.name}</strong><br>
                            <span class="reward-tag priority-${r.priority}">${r.priority.toUpperCase()}</span>
                        </div>
                        <div class="button-group">
                            <button class="action-btn edit-btn" onclick="openEditReward(${r.id})">Edit</button>
                            <button class="action-btn danger-btn" onclick="deleteReward(${r.id})">Delete</button>
                        </div>
                    `;
                    container.appendChild(card);
                }
            });
            if(!unlockedContainer.innerHTML) unlockedContainer.innerHTML = `<p style="color:var(--muted); font-size:0.9rem; text-align:center;">No rewards unlocked yet. Complete your goals!</p>`;
        };
    }

    function deleteReward(id) {
        if(confirm("Delete this reward from your asset pool?")) {
            let tx = db.transaction("rewards", "readwrite");
            tx.objectStore("rewards").delete(id);
            tx.oncomplete = () => renderAll();
        }
    }

    function claimReward(id) {
        let tx = db.transaction("rewards", "readwrite");
        tx.objectStore("rewards").delete(id);
        tx.oncomplete = () => renderAll();
    }

    function populateRewardDropdown(selectedRewardId) {
        const select = document.getElementById('goalRewardSelect');
        select.innerHTML = '<option value="">No Reward Assigned Yet</option>';
        db.transaction("rewards", "readonly").objectStore("rewards").getAll().onsuccess = (e) => {
            e.target.result.filter(r => r.status === 'pool' || r.id === selectedRewardId).forEach(r => {
                const isSelected = r.id === selectedRewardId ? 'selected' : '';
                select.innerHTML += `<option value="${r.id}" ${isSelected}>${r.name} (${r.priority})</option>`;
            });
        };
    }

    // --- GOALS LOGIC ---
    function saveGoal() {
        const title = document.getElementById('goalTitle').value.trim();
        const days = parseInt(document.getElementById('goalDays').value);
        const rewardId = document.getElementById('goalRewardSelect').value;
        const editId = document.getElementById('editGoalId').value;
        if(!title || isNaN(days)) return;

        let tx = db.transaction("goals", "readwrite");
        let store = tx.objectStore("goals");

        if (editId) {
            store.get(parseInt(editId)).onsuccess = (e) => {
                let data = e.target.result;
                data.title = title;
                data.days = days;
                data.rewardId = rewardId ? parseInt(rewardId) : null;
                store.put(data);
            };
        } else {
            store.add({ title, days, streak: 0, rewardId: rewardId ? parseInt(rewardId) : null });
        }

        tx.oncomplete = () => {
            closeModal('goalModal');
            renderAll();
        };
    }

    function openGoalModal() {
        document.getElementById('goalModalTitle').innerText = "Create New Goal";
        document.getElementById('saveGoalBtn').innerText = "Create Goal";
        document.getElementById('editGoalId').value = "";
        document.getElementById('goalTitle').value = "";
        document.getElementById('goalDays').value = "7";
        populateRewardDropdown(null);
        document.getElementById('goalModal').style.display = 'flex';
    }

    function openEditGoal(id) {
        db.transaction("goals", "readonly").objectStore("goals").get(id).onsuccess = (e) => {
            const g = e.target.result;
            if (!g) return;
            document.getElementById('goalModalTitle').innerText = "Edit Active Goal";
            document.getElementById('saveGoalBtn').innerText = "Update Goal";
            document.getElementById('editGoalId').value = g.id;
            document.getElementById('goalTitle').value = g.title;
            document.getElementById('goalDays').value = g.days;
            populateRewardDropdown(g.rewardId);
            document.getElementById('goalModal').style.display = 'flex';
        };
    }

    function renderGoals() {
        const container = document.getElementById('goalsContainer');
        container.innerHTML = '';

        db.transaction(["goals", "rewards"], "readonly").objectStore("goals").getAll().onsuccess = (e) => {
            const goals = e.target.result;
            if(goals.length === 0) {
                container.innerHTML = `<p style="color:var(--muted); text-align:center;">No active goals. Add one below!</p>`;
                return;
            }
            
            goals.forEach(g => {
                const card = document.createElement('div');
                card.className = "item-card goal-card flex-between";
                
                let rewardHtml = `<span style="font-size:0.8rem; color:var(--muted);">No Reward linked</span>`;
                if(g.rewardId) {
                    db.transaction("rewards", "readonly").objectStore("rewards").get(g.rewardId).onsuccess = (re) => {
                        if(re.target.result) {
                            document.getElementById(`rew-${g.id}`).innerHTML = `🎁 Reward: <strong>${re.target.result.name}</strong>`;
                        } else {
                            document.getElementById(`rew-${g.id}`).innerHTML = `<span style="color:var(--danger)">Linked reward missing!</span>`;
                        }
                    };
                    rewardHtml = `<span id="rew-${g.id}" style="font-size:0.8rem; color:var(--muted);">Loading reward...</span>`;
                }

                card.innerHTML = `
                    <div style="overflow: hidden; text-overflow: ellipsis;">
                        <strong style="font-size:1.1rem;">${g.title}</strong><br>
                        ${rewardHtml}
                    </div>
                    <div class="flex-between" style="flex-shrink: 0;">
                        <span class="streak-badge">${g.streak} / ${g.days} Days</span>
                        <div class="button-group">
                            <button class="action-btn edit-btn" onclick="openEditGoal(${g.id})">Edit</button>
                            <button class="action-btn danger-btn" onclick="deleteGoal(${g.id})">X</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        };
    }

    function deleteGoal(id) {
        if(confirm("Delete this goal? Stream metrics will be lost.")) {
            let tx = db.transaction("goals", "readwrite");
            tx.objectStore("goals").delete(id);
            tx.oncomplete = () => renderAll();
        }
    }

    // --- CALENDAR & PROGRESS ENGINE ---
    function changeMonth(direction) {
        currentNavDate.setMonth(currentNavDate.getMonth() + direction);
        renderCalendar();
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        const monthYearLabel = document.getElementById('calendarMonthYear');
        grid.innerHTML = '';

        const year = currentNavDate.getFullYear();
        const month = currentNavDate.getMonth();
        
        monthYearLabel.innerText = currentNavDate.toLocaleDateString('default', { month: 'long', year: 'numeric' });

        const daysInWeek = ['S','M','T','W','T','F','S'];
        daysInWeek.forEach(d => grid.innerHTML += `<div class="calendar-day-name">${d}</div>`);

        const firstDayIndex = new Date(year, month, 1).getDay();
        const totalDays = new Date(year, month + 1, 0).getDate();

        for(let i=0; i<firstDayIndex; i++) {
            grid.innerHTML += `<div class="calendar-day empty"></div>`;
        }

        // Get both history logs and goals to calculate dynamic day coloring shades
        db.transaction(["history", "goals"], "readonly").objectStore("history").getAll().onsuccess = (event) => {
            const historyList = event.target.result;
            const logs = historyList.reduce((acc, current) => {
                acc[current.dateStr] = current.completedIds || []; 
                return acc;
            }, {});

            db.transaction("goals", "readonly").objectStore("goals").getAll().onsuccess = (gEvent) => {
                const totalActiveGoalsCount = gEvent.target.result.length;

                const today = new Date();
                const todayStr = `${today.getFullYear()}-${today.getMonth()}-${today.getDate()}`;

                for(let day=1; day<=totalDays; day++) {
                    const dateStr = `${year}-${month}-${day}`;
                    let statusClass = '';
                    
                    if (logs[dateStr] && logs[dateStr].length > 0) {
                        // If everything active or more was checked, give it full success colors
                        if (totalActiveGoalsCount > 0 && logs[dateStr].length >= totalActiveGoalsCount) {
                            statusClass = 'day-all-success';
                        } else {
                            statusClass = 'day-some-success';
                        }
                    } else if (logs[dateStr] !== undefined) {
                        statusClass = 'day-all-fail';
                    }

                    const isToday = todayStr === dateStr ? 'today' : '';
                    
                    grid.innerHTML += `
                        <div class="calendar-day ${statusClass} ${isToday}" onclick="openDayLog('${dateStr}', ${day})">
                            ${day}
                            ${isToday ? '<div class="day-dot"></div>': ''}
                        </div>
                    `;
                }
            };
        };
    }

    function openDayLog(dateStr, displayDay) {
        selectedLogDateStr = dateStr;
        document.getElementById('logModalDate').innerText = currentNavDate.toLocaleDateString('default', { month: 'long', year: 'numeric' }) + ` ${displayDay}`;
        
        const container = document.getElementById('logModalGoalsList');
        container.innerHTML = '';

        db.transaction(["history", "goals"], "readonly").objectStore("history").get(dateStr).onsuccess = (e) => {
            const logEntry = e.target.result;
            const completedIds = logEntry ? (logEntry.completedIds || []) : [];

            db.transaction("goals", "readonly").objectStore("goals").getAll().onsuccess = (ge) => {
                const activeGoals = ge.target.result;
                
                if (activeGoals.length === 0) {
                    container.innerHTML = `<p style="color:var(--muted); text-align:center;">No active goals created to log for this day.</p>`;
                    document.getElementById('logModal').style.display = 'flex';
                    return;
                }

                activeGoals.forEach(goal => {
                    const isChecked = completedIds.includes(goal.id);
                    const row = document.createElement('div');
                    row.className = "habit-log-row";
                    row.innerHTML = `
                        <div><strong>${goal.title}</strong></div>
                        <button class="habit-toggle-btn ${isChecked ? 'done' : ''}" id="toggle-${goal.id}" onclick="toggleHabitLog(${goal.id})">
                            ${isChecked ? '✓ Completed' : '○ Mark Done'}
                        </button>
                    `;
                    container.appendChild(row);
                });

                document.getElementById('logModal').style.display = 'flex';
            };
        };
    }

    function toggleHabitLog(goalId) {
        const btn = document.getElementById(`toggle-${goalId}`);
        const changingToChecked = !btn.classList.contains('done');

        let tx = db.transaction(["history", "goals", "rewards"], "readwrite");
        let historyStore = tx.objectStore("history");
        let goalStore = tx.objectStore("goals");
        let rewardStore = tx.objectStore("rewards");

        historyStore.get(selectedLogDateStr).onsuccess = (e) => {
            let log = e.target.result || { dateStr: selectedLogDateStr, completedIds: [] };
            
            if (changingToChecked) {
                if (!log.completedIds.includes(goalId)) log.completedIds.push(goalId);
                btn.classList.add('done');
                btn.innerText = '✓ Completed';
                
                // Advance specific habit streak
                goalStore.get(goalId).onsuccess = (ge) => {
                    let goal = ge.target.result;
                    if (goal) {
                        goal.streak += 1;
                        if (goal.streak >= goal.days) {
                            triggerCelebration(goal);
                            if (goal.rewardId) {
                                rewardStore.get(goal.rewardId).onsuccess = (re) => {
                                    let rew = re.target.result;
                                    if(rew) {
                                        rew.status = 'unlocked';
                                        rewardStore.put(rew);
                                    }
                                };
                            }
                            goalStore.delete(goalId);
                            // Remove from local list row view instantly
                            btn.parentElement.style.opacity = '0.4';
                            btn.disabled = true;
                        } else {
                            goalStore.put(goal);
                        }
                    }
                };
            } else {
                log.completedIds = log.completedIds.filter(id => id !== goalId);
                btn.classList.remove('done');
                btn.innerText = '○ Mark Done';
                
                // Revert specific habit streak
                goalStore.get(goalId).onsuccess = (ge) => {
                    let goal = ge.target.result;
                    if (goal && goal.streak > 0) {
                        goal.streak -= 1;
                        goalStore.put(goal);
                    }
                };
            }
            historyStore.put(log);
        };
    }

    // --- CELEBRATION MODAL & CANVAS ANIMATION ---
    function triggerCelebration(goal) {
        document.getElementById('celebrationGoalText').innerText = `"${goal.title}"`;
        const rewardBox = document.getElementById('celebrationRewardBox');
        
        if (goal.rewardId) {
            db.transaction("rewards", "readonly").objectStore("rewards").get(goal.rewardId).onsuccess = (e) => {
                const r = e.target.result;
                rewardBox.style.display = 'block';
                rewardBox.innerHTML = r ? `🎁 UNLOCKED: <strong>${r.name}</strong>` : `🎁 Reward item retrieved!`;
            };
        } else {
            rewardBox.style.display = 'none';
        }

        document.getElementById('celebrationModal').style.display = 'flex';
        startFireworks();
    }

    // Pure Canvas Firework Engine
    const canvas = document.getElementById('celebrationCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function setupCanvasSize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function startFireworks() {
        particles = [];
        for (let i = 0; i < 5; i++) {
            setTimeout(() => {
                spawnFireworkCluster(Math.random() * canvas.width, canvas.height * 0.3 + Math.random() * (canvas.height * 0.4));
            }, i * 350);
        }
        requestAnimationFrame(animateFireworks);
    }

    function spawnFireworkCluster(x, y) {
        const colors = ['#6366f1', '#22c55e', '#ef4444', '#f59e0b', '#3b82f6', '#ec4899', '#a855f7'];
        const baseColor = colors[Math.floor(Math.random() * colors.length)];
        for (let i = 0; i < 40; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 5 + 2;
            particles.push({
                x: x, y: y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                alpha: 1,
                decay: Math.random() * 0.015 + 0.01,
                color: baseColor
            });
        }
    }

    function animateFireworks() {
        if (document.getElementById('celebrationModal').style.display === 'none' && particles.length === 0) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            return;
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.06;
            p.alpha -= p.decay;

            if (p.alpha <= 0) {
                particles.splice(i, 1);
            } else {
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        if (document.getElementById('celebrationModal').style.display === 'flex' || particles.length > 0) {
            if(document.getElementById('celebrationModal').style.display === 'flex' && Math.random() < 0.1) {
                spawnFireworkCluster(Math.random() * canvas.width, Math.random() * canvas.height * 0.7);
            }
            requestAnimationFrame(animateFireworks);
        }
    }
</script>
